name: Karate Tests

permissions:
  pull-requests: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: true
        default: 'master'
        type: string
      pr_number:
        description: 'PR number to comment results on (optional)'
        required: false
        type: string
  pull_request:
    branches:
      - master
      - develop

jobs:
  karate-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      #      - name: Create .env.secret file
      #        run: |
      #          echo "INFISICAL_TOKEN=${{ secrets.INFISICAL_TOKEN }}" > karate-test/src/test/resources/.env.secret

      - name: Run Karate Tests
        id: run-tests
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          cd karate-test
          mvn clean test "-Dkarate.options=--tags @Regresion" | tee test-output.log
          echo "TEST_SUMMARY=$(grep -o "Tests run: [0-9]*, Failures: [0-9]*, Errors: [0-9]*, Skipped: [0-9]*" test-output.log | tail -1)" >> $GITHUB_OUTPUT
          
          # Extraer detalles de features
          echo "FEATURE_DETAILS<<EOF" >> $GITHUB_OUTPUT
          grep -E "feature:|scenarios:|passed:|failed:|time:" test-output.log | sed 's/^[[:space:]]*//' | awk '
          BEGIN { feature=""; scenarios=""; passed=""; failed=""; time="" }
          /^feature:/ { 
            if (feature != "") print feature " | scenarios: " scenarios " | passed: " passed " | failed: " failed " | time: " time
            feature=$0; gsub(/^feature: /, "", feature); gsub(/classpath:features\//, "", feature); gsub(/\.feature/, "", feature)
            scenarios=""; passed=""; failed=""; time=""
          }
          /^scenarios:/ { scenarios=$0; gsub(/^scenarios:[[:space:]]*/, "", scenarios) }
          /^passed:/ { passed=$0; gsub(/^passed:[[:space:]]*/, "", passed) }
          /^failed:/ { failed=$0; gsub(/^failed:[[:space:]]*/, "", failed) }
          /^time:/ { time=$0; gsub(/^time:[[:space:]]*/, "", time) }
          END { if (feature != "") print feature " | scenarios: " scenarios " | passed: " passed " | failed: " failed " | time: " time }
          ' >> temp-features.txt 2>/dev/null || true
          cat temp-features.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT 

      - name: List test reports
        if: always()
        run: |
          echo "=== Checking for reports ==="
          ls -la karate-test/target/ || echo "No target directory"
          ls -la karate-test/target/surefire-reports/ || echo "No surefire-reports"
          ls -la karate-test/target/karate-reports/ || echo "No karate-reports"

      - name: Upload Karate Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: |
            karate-test/target/surefire-reports/
            karate-test/target/karate-reports/
          retention-days: 1

      - name: Comment PR with test results
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const testSummary = `${{ steps.run-tests.outputs.TEST_SUMMARY }}`;
            const rawFeatureDetails = `${{ steps.run-tests.outputs.FEATURE_DETAILS }}`;
            let prNumber = null;
            
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.inputs?.pr_number) {
              prNumber = parseInt(context.payload.inputs.pr_number);
            }
            
            const failureMatch = testSummary.match(/Failures: (\d+)/);
            const failures = failureMatch ? parseInt(failureMatch[1]) : 0;
            const statusIcon = failures > 0 ? '❌' : '✅';
            
            let featuresSummary = '';
            if (rawFeatureDetails && rawFeatureDetails.trim()) {
              featuresSummary = '\n\n### 📋 Feature Details\n\n';
              featuresSummary += '| Status | Feature | Scenarios | Passed | Failed | Time |\n';
              featuresSummary += '|--------|---------|-----------|--------|--------|------|\n';
              const features = rawFeatureDetails.split('\n').filter(line => line.trim());
              features.forEach(feature => {
                const failedMatch = feature.match(/failed:\s*(\d+)/);
                const scenariosMatch = feature.match(/scenarios:\s*(\d+)/);
                const passedMatch = feature.match(/passed:\s*(\d+)/);
                const timeMatch = feature.match(/time:\s*([\d.]+)/);
                const failedCount = failedMatch ? parseInt(failedMatch[1]) : 0;
                const scenarios = scenariosMatch ? scenariosMatch[1] : '0';
                const passed = passedMatch ? passedMatch[1] : '0';
                const time = timeMatch ? timeMatch[1] + 's' : 'N/A';
                const featureName = feature.split(' |')[0].trim();
                const icon = failedCount > 0 ? '❌' : '✅';
                featuresSummary += `| ${icon} | ${featureName} | ${scenarios} | ${passed} | ${failedCount} | ${time} |\n`;
              });
            }
            
            const reportLink = `\n\n---\n📊 [View Jacoco Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            const formattedMessage = `## 🧪 Karate Test Results\n\n${statusIcon} ${testSummary || 'Test results not available'}${featuresSummary}${reportLink}`;
            
            if (prNumber) {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: formattedMessage
              });
              console.log(`Commented on PR #${prNumber}`);
            } else {
              console.log('No PR to comment on. Test Summary:\n' + formattedMessage);
            }
