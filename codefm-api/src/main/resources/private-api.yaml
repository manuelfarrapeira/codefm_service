components:
  schemas:
    ErrorResponseDTO:
      $ref: './common-schemas.yaml#/ErrorResponseDTO'
    DetailDTO:
      $ref: './common-schemas.yaml#/DetailDTO'
    SchoolDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        name:
          type: 'string'
        town:
          type: 'string'
        tlf:
          type: 'integer'
        classes:
          type: 'array'
          items:
            $ref: '#/components/schemas/ClassDTO'
    ClassDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        schoolId:
          type: 'integer'
        name:
          type: 'string'
        schoolYear:
          type: 'string'
    ClassRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: '1º A'
        schoolYear:
          type: 'string'
          example: '24/25'
    SchoolRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: 'New School Name'
        town:
          type: 'string'
          example: 'New Town'
        tlf:
          type: 'integer'
          example: 123456789
    StudentDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        name:
          type: 'string'
        surnames:
          type: 'string'
        dateOfBirth:
          type: 'string'
          description: 'Date in format dd/MM/yyyy'
          example: '15/03/2010'
        gender:
          type: 'string'
          description: 'Gender (M=Male, F=Female)'
        additionalInfo:
          type: 'string'
        photo:
          type: 'string'
        classIds:
          type: 'array'
          items:
            type: 'integer'
          description: 'List of class IDs the student belongs to'
    StudentRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: 'Juan'
        surnames:
          type: 'string'
          example: 'García López'
        dateOfBirth:
          type: 'string'
          description: 'Date in format dd/MM/yyyy'
          example: '15/03/2010'
        gender:
          type: 'string'
          description: 'Gender (M=Male, F=Female)'
          example: 'M'
        additionalInfo:
          type: 'string'
          example: 'Additional information about the student'
    SubjectDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        name:
          type: 'string'
    SubjectRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: 'Mathematics'
    ScheduleDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        classId:
          type: 'integer'
        subjectId:
          type: 'integer'
        day:
          type: 'integer'
          description: 'Day of week (1=Monday, 5=Friday)'
        start:
          type: 'string'
          description: 'Time in format HH:mm'
          example: '08:30'
        end:
          type: 'string'
          description: 'Time in format HH:mm'
          example: '09:30'
    ScheduleCreateRequestDTO:
      type: 'object'
      required:
        - day
        - items
      properties:
        day:
          type: 'integer'
          description: 'Day of week (1=Monday, 5=Friday)'
          example: 1
        items:
          type: 'array'
          items:
            $ref: '#/components/schemas/ScheduleItemDTO'
    ScheduleItemDTO:
      type: 'object'
      required:
        - subjectId
        - start
        - end
      properties:
        subjectId:
          type: 'integer'
          example: 1
        start:
          type: 'string'
          description: 'Start time in format HH:mm'
          example: '08:30'
        end:
          type: 'string'
