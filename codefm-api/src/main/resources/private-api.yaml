openapi: 3.0.3
info:
  title: CodeFm Private API
  description: CodeFm private services API (authentication required)
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Development server

tags:
  - name: PrivateHelloWorld
    description: Private operations related to greeting
  - name: TeacherNoteBookSchools
    description: Operations related to Teacher Notebook Schools
  - name: TeacherNoteBookClasses
    description: Operations related to Teacher Notebook School Classes
  - name: TeacherNoteBookStudents
    description: Operations related to Teacher Notebook Students

paths:
  /greeting:
    get:
      tags:
        - PrivateHelloWorld
      operationId: hello
      summary: Basic greeting endpoint (authenticated)
      description: Returns a simple greeting
      parameters:
        - name: user
          in: query
          required: true
          description: User for greeting
          schema:
            type: string
            example: "Manuel"
      responses:
        '200':
          description: Successful greeting
          content:
            text/plain:
              schema:
                type: string
                example: "¡Hi!"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /teacher-notebook/v1/schools:
    get:
      tags:
        - TeacherNoteBookSchools
      operationId: schools
      summary: Endpoint to get school information
      description: Returns school information
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    put:
      tags:
        - TeacherNoteBookSchools
      operationId: createSchool
      summary: Create a new school
      description: Creates a new school for the authenticated teacher
      parameters:
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolRequestDTO'
      responses:
        '201':
          description: School created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /teacher-notebook/v1/schools/{id}:
    delete:
      tags:
        - TeacherNoteBookSchools
      operationId: deleteSchool
      summary: Soft-delete a school
      description: Marks a school as deleted by setting its deletion_date. Only the owning teacher can delete a school.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the school to delete
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      responses:
        '204':
          description: School successfully soft-deleted (No Content)
        '403':
          description: Forbidden - Teacher does not own this school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - School with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    patch:
      tags:
        - TeacherNoteBookSchools
      operationId: updateSchool
      summary: Update an existing school
      description: Updates an existing school for the authenticated teacher
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the school to update
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolRequestDTO'
      responses:
        '200':
          description: School updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '403':
          description: Forbidden - Teacher does not own this school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - School with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /teacher-notebook/v1/school/{schoolId}/classes:
    get:
      tags:
        - TeacherNoteBookClasses
      operationId: classes
      summary: Retrieve active classes for a school
      description: Returns classes for the specified school that have not been soft-deleted.
      parameters:
        - name: schoolId
          in: path
          required: true
          description: The ID of the school whose classes are requested.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassDTO'
        '403':
          description: Forbidden - Teacher does not own this school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - School with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    put:
      tags:
        - TeacherNoteBookClasses
      operationId: createClass
      summary: Create a new class for a school
      description: Creates a new class for the specified school owned by the authenticated teacher.
      parameters:
        - name: schoolId
          in: path
          required: true
          description: The ID of the school to create the class for.
          schema:
            type: integer
            format: int32
        - name: Accept-Language
          in: header
          required: false
          description: Preferred language for response messages
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassRequestDTO'
      responses:
        '201':
          description: Class created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDTO'
        '400':
          description: Bad Request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '403':
          description: Forbidden - Teacher does not own this school
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - School with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /teacher-notebook/v1/classes/{classId}:
    delete:
      tags:
        - TeacherNoteBookClasses
      operationId: deleteClass
      summary: Soft-delete a class
      description: Marks a class as deleted by setting its deletion_date. Only the teacher who owns the school can delete its classes.
      parameters:
        - name: classId
          in: path
          required: true
          description: The ID of the class to delete
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      responses:
        '204':
          description: Class successfully soft-deleted (No Content)
        '403':
          description: Forbidden - Teacher does not own the school of this class
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    patch:
      tags:
        - TeacherNoteBookClasses
      operationId: updateClass
      summary: Update an existing class
      description: Updates an existing class for the authenticated teacher. Only name and schoolYear can be updated.
      parameters:
        - name: classId
          in: path
          required: true
          description: The ID of the class to update
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassRequestDTO'
      responses:
        '200':
          description: Class updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '403':
          description: Forbidden - Teacher does not own the school of this class
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - Class with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /teacher-notebook/v1/students:
    get:
      tags:
        - TeacherNoteBookStudents
      operationId: searchStudents
      summary: Search students by filters
      description: Search students by id, name or surnames. At least one filter must be provided.
      parameters:
        - name: id
          in: query
          required: false
          description: Student ID
          schema:
            type: integer
            format: int32
        - name: name
          in: query
          required: false
          description: Student name (partial match)
          schema:
            type: string
        - name: surnames
          in: query
          required: false
          description: Student surnames (partial match)
          schema:
            type: string
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      responses:
        '200':
          description: Students found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentDTO'
        '400':
          description: Validation error - At least one filter is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    put:
      tags:
        - TeacherNoteBookStudents
      operationId: createStudent
      summary: Create a new student
      description: Creates a new student
      parameters:
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequestDTO'
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /teacher-notebook/v1/students/{id}:
    patch:
      tags:
        - TeacherNoteBookStudents
      operationId: updateStudent
      summary: Update an existing student
      description: Updates an existing student
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the student to update
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRequestDTO'
      responses:
        '200':
          description: Student updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDTO'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found - Student with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    delete:
      tags:
        - TeacherNoteBookStudents
      operationId: deleteStudent
      summary: Soft-delete a student
      description: Marks a student as deleted by setting its deletion_date
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the student to delete
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      responses:
        '204':
          description: Student successfully soft-deleted (No Content)
        '404':
          description: Not Found - Student with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /teacher-notebook/v1/students/{id}/photo:
    post:
      tags:
        - TeacherNoteBookStudents
      operationId: uploadStudentPhoto
      summary: Upload a photo for a student
      description: Uploads a photo file for the specified student. The file will be saved with the student's ID as the filename.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the student
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages (e.g., "es", "en"). Defaults to "en".
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The photo file to upload
      responses:
        '200':
          description: Photo uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  photoPath:
                    type: string
                    description: The path where the photo was saved
        '404':
          description: Not Found - Student with the specified ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

components:
  schemas:
    ErrorResponseDTO:
      $ref: './common-schemas.yaml#/ErrorResponseDTO'
    DetailDTO:
      $ref: './common-schemas.yaml#/DetailDTO'
    SchoolDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        name:
          type: 'string'
        town:
          type: 'string'
        tlf:
          type: 'integer'
        classes:
          type: 'array'
          items:
            $ref: '#/components/schemas/ClassDTO'
    ClassDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        schoolId:
          type: 'integer'
        name:
          type: 'string'
        schoolYear:
          type: 'string'
    ClassRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: '1º A'
        schoolYear:
          type: 'string'
          example: '24/25'
    SchoolRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: 'New School Name'
        town:
          type: 'string'
          example: 'New Town'
        tlf:
          type: 'integer'
          example: 123456789
    StudentDTO:
      type: 'object'
      properties:
        id:
          type: 'integer'
        name:
          type: 'string'
        surnames:
          type: 'string'
        dateOfBirth:
          type: 'string'
          description: 'Date in format dd/MM/yyyy'
          example: '15/03/2010'
        additionalInfo:
          type: 'string'
        photo:
          type: 'string'
    StudentRequestDTO:
      type: 'object'
      properties:
        name:
          type: 'string'
          example: 'Juan'
        surnames:
          type: 'string'
          example: 'García López'
        dateOfBirth:
          type: 'string'
          description: 'Date in format dd/MM/yyyy'
          example: '15/03/2010'
        additionalInfo:
          type: 'string'
          example: 'Additional information about the student'
