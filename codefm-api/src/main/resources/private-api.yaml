openapi: 3.0.3
info:
  title: CodeFm Private API
  description: CodeFm private services API (authentication required)
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Development server

tags:
  - name: PrivateHelloWorld
    description: Private operations related to greeting

paths:
  /greeting:
    get:
      tags:
        - PrivateHelloWorld
      operationId: hello
      summary: Basic greeting endpoint (authenticated)
      description: Returns a simple greeting
      parameters:
        - name: user
          in: query
          required: true
          description: User for greeting
          schema:
            type: string
            example: "Manuel"
      responses:
        '200':
          description: Successful greeting
          content:
            text/plain:
              schema:
                type: string
                example: "¡Hi!"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

components:
  schemas:
    ErrorResponseDTO:
      $ref: './common-schemas.yaml#/ErrorResponseDTO'
    DetailDTO:
      $ref: './common-schemas.yaml#/DetailDTO'