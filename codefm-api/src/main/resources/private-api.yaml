          description: Forbidden - Class does not belong to teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
    delete:
      tags:
        - TeacherNoteBookStudentAbsences
      operationId: deleteAbsencesByStudentAndDate
      summary: Delete all absences for a student in a class on a specific date
      description: Deletes all absence records for the given student, class, and date combination.
      parameters:
        - name: classId
          in: path
          required: true
          description: The ID of the class
          schema:
            type: integer
            format: int32
        - name: studentId
          in: query
          required: true
          description: The ID of the student
          schema:
            type: integer
            format: int32
        - name: date
          in: query
          required: true
          description: The date in format dd/MM/yyyy
          schema:
            type: string
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages
      responses:
        '204':
          description: Absences successfully deleted
        '403':
          description: Forbidden - Class does not belong to teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /teacher-notebook/v1/absences/{id}:
    delete:
      tags:
        - TeacherNoteBookStudentAbsences
      operationId: deleteAbsence
      summary: Delete a single absence by ID
      description: Permanently deletes an absence record by its ID. Only the owning teacher can delete the absence.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the absence to delete
          schema:
            type: integer
            format: int32
        - in: header
          name: Accept-Language
          schema:
            type: string
            default: en
          description: Language preference for error messages
      responses:
        '204':
          description: Absence successfully deleted
        '404':
          description: Not Found - Absence does not exist or does not belong to teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

