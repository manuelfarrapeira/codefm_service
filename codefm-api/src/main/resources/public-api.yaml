openapi: 3.0.3
info:
  title: CodeFm Public API
  description: CodeFm public services API (no authentication required)
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Development server

tags:
  - name: PublicHelloWorld
    description: Public operations related to greeting
  - name: Auth
    description: Authentication operations


paths:
  /public/greeting:
    get:
      tags:
        - PublicHelloWorld
      x-controller-name: PublicHelloWorld
      operationId: hello
      summary: Public basic greeting endpoint
      description: Returns a simple greeting
      responses:
        '200':
          description: Successful greeting
          content:
            text/plain:
              schema:
                type: string
                example: "¡Hi!"
  /public/auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Authenticate user
      description: Authenticate user using credentials
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Authorization token in Basic or Bearer format
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /public/auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshToken
      summary: Refresh token
      description: Refresh access token using refresh token
      responses:
        '200':
          description: Token successfully refreshed
          content:
            application/json:
              schema:
                type: string
                example: "Token refreshed successfully"
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
  /public/auth/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: Delete token
      description: Delete token
      responses:
        '200':
          description: Token successfully removed
          content:
            application/json:
              schema:
                type: string
                example: "Token deleted successfully"
        '401':
          description: Token de refresco inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
components:
  schemas:
    LoginResponseDTO:
      type: object
      required:
        - userName
        - accessToken
      properties:
        userName:
          type: string
          description: User's full name
          example: "John Doe"
        accessToken:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
    ErrorResponseDTO:
      $ref: './common-schemas.yaml#/ErrorResponseDTO'
    DetailDTO:
      $ref: './common-schemas.yaml#/DetailDTO'