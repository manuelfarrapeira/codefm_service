management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    metrics:
      enabled: true
    health:
      show-details: always

spring:
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: codefm-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: http://schema-registry:8081
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: http://schema-registry:8081
    properties:
      schema.registry.url: http://schema-registry:8081
      security.protocol: PLAINTEXT


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://codefm.synology.me:8480/realms/codefm
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
          token-path: /protocol/openid-connect/token
          logout-path: /protocol/openid-connect/logout
  application:
    name: codefm
  config:
    import:
      - "optional:consul:"
  cloud:
    loadbalancer:
      enabled: false
    consul:
      host: http://192.168.18.10
      port: 8500
      token: ${TOKEN_CONSUL}
      discovery:
        enabled: true
        instanceId: ${spring.application.name}:${random.value}
        healthCheckPath: /actuator/health
        healthCheckInterval: 10s
      config:
        enabled: true
        format: YAML
        prefixes: config
        defaultContext: application
        profileSeparator: ','
  data:
    rest:
      detection-strategy: ANNOTATED #esto es para evitar la generación de endpoints relacionados con los JPA
  datasource:
    codefm:
      driver-class-name: com.p6spy.engine.spy.P6SpyDriver
      url: jdbc:p6spy:mariadb://192.168.18.10:3306/codefm
      username: codefm
      password: ${MARIADB_PASSWORD}
    teachernotebook:
      driver-class-name: com.p6spy.engine.spy.P6SpyDriver
      url: jdbc:p6spy:mariadb://192.168.18.10:3306/teacher_notebook
      username: codefm
      password: ${MARIADB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        style_table_aliases: none
        use_legacy_limit_handler: true
  jackson:
    serialization:
      indent-output: true

keycloak:
  client-id: codefm

consul:
  parametro: valorPorDefecto

reactor:
  executor:
    default:
      partition-limit: 250
      retry: 1
      concurrency: 5
      timeout: 6000
    example:
      partition-limit: 25
      retry: 1
      concurrency: 5
      timeout: 6000


kafka:
  topic:
    user: codefm.pro.user
  schema:
    registry:
      url: http://codefm.synology.me:8082

student:
  photos:
    directory: ./data/student-photos

exercise:
  documents:
    directory: ./data/exercise-documents
  student-documents:
    directory: ./data/exercise-student-document
