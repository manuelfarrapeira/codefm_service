services:
  codefm-pre:
    container_name: codefm-pre
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    image: mfarrapeira/codefm-pre:latest
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=pre
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      app_name: codefm-pre
      prometheus_job: 'codefm-pre'
      prometheus_target: 'codefm.synology.me:8081'
    volumes:
      - ./logs:/app/logs
      - ./data/student-photos:/app/photos
    networks:
      - logging
      - infisical_external
      - keycloak
      - kafka-network


networks:
  logging:
    external: true
  infisical_external:
    external: true
  keycloak:
    external: true
  sonarqube:
    external: true
  kafka-network:
    external: true

