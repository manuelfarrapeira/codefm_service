gatling {
    core {
        outputDirectoryBaseName = "gatling-results"
        runDescription = "CodeFM Stress Tests"
        encoding = "utf-8"
        simulationClass = "org.web.codefm.gatling.ClassesStressSimulation"
    }
    http {
        enableGA = false
    }
    charting {
        noReports = false
        indicators {
            lowerBound = 800
            higherBound = 1200
        }
    }
}

